<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LenteFría | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .bg-cyan-lf { background-color: #00B7F1; }
        .text-cyan-lf { color: #00B7F1; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .vault-card { transition: all 0.3s ease; border-radius: 2.5rem; }
        .vault-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,183,241,0.1); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 glass border-b border-slate-100 px-8 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <img src="logo.png" alt="LenteFría" class="h-12">
            <div class="flex items-center gap-6">
                <button onclick="toggleSection('admin-panel')" class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-cyan-lf">Staff</button>
                <button onclick="toggleSection('photographer-panel')" class="text-xs font-bold uppercase tracking-widest text-black underline decoration-cyan-lf decoration-4">Galerías</button>
                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-bold border-2 border-white shadow-sm">Y</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12">
        
        <!-- SECCIÓN ADMINISTRADOR: GESTIÓN DE STAFF -->
        <section id="admin-panel" class="hidden mb-20 animate-in fade-in duration-500">
            <div class="bg-slate-900 rounded-[3rem] p-12 text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-3xl font-extrabold tracking-tighter">Gestión de Staff</h2>
                        <button onclick="openUserModal()" class="bg-cyan-lf text-white px-6 py-3 rounded-2xl font-bold text-xs"> + AGREGAR FOTÓGRAFO</button>
                    </div>
                    <div id="staff-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Usuarios cargados aquí -->
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN FOTÓGRAFO: GALERÍAS -->
        <section id="photographer-panel">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-6xl font-black tracking-tighter mb-2">Entregas</h2>
                    <p class="text-slate-400 font-medium text-lg italic">Bóvedas de seguridad para activos digitales</p>
                </div>
                <button onclick="toggleModal(true)" class="bg-black text-white px-10 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-cyan-500/20 hover:bg-cyan-lf transition-all flex items-center gap-3">
                    Nueva Entrega
                </button>
            </div>

            <div id="galleries-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <!-- Galerías -->
            </div>
        </section>
    </main>

    <!-- MODAL CREACIÓN USUARIO -->
    <div id="user-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md"></div>
        <div class="relative bg-white w-full max-w-md rounded-[3rem] p-12">
            <h3 class="text-3xl font-black mb-6 tracking-tighter text-cyan-lf">Nuevo Miembro</h3>
            <div class="space-y-4">
                <input type="text" id="staffName" placeholder="Nombre Completo" class="w-full bg-slate-50 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-cyan-lf">
                <input type="email" id="staffEmail" placeholder="Correo Google" class="w-full bg-slate-50 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-cyan-lf">
                <button onclick="apiCreateStaff()" class="w-full bg-black text-white py-5 rounded-2xl font-bold tracking-widest uppercase">Autorizar Acceso</button>
                <button onclick="closeUserModal()" class="w-full text-slate-400 text-xs font-bold">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL CARGA DE ARCHIVOS -->
    <div id="upload-modal" class="hidden fixed inset-0 z-[120] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-cyan-lf/20 backdrop-blur-xl"></div>
        <div class="relative bg-white w-full max-w-lg rounded-[3rem] p-12 text-center">
            <i class="fa-solid fa-cloud-arrow-up text-6xl text-cyan-lf mb-6"></i>
            <h3 class="text-3xl font-black mb-2">Cargar Activos</h3>
            <p id="upload-target-name" class="text-slate-400 mb-8 font-bold uppercase text-xs tracking-widest"></p>
            <input type="file" id="fileInput" multiple class="hidden">
            <button onclick="document.getElementById('fileInput').click()" class="w-full border-4 border-dashed border-slate-100 py-12 rounded-[2rem] text-slate-300 font-bold hover:border-cyan-lf hover:text-cyan-lf transition-all mb-4">Seleccionar Fotos / Videos</button>
            <button onclick="closeUploadModal()" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Finalizar</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://shiny-engine-p79vw5gqp9gc96w-8000.app.github.dev";

        function toggleSection(id) {
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('photographer-panel').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            if(id === 'admin-panel') fetchStaff();
        }

        async function fetchStaff() {
            const res = await fetch(`${BASE_URL}/admin/staff`);
            const staff = await res.json();
            document.getElementById('staff-list').innerHTML = staff.map(s => `
                <div class="bg-white/5 border border-white/10 p-6 rounded-3xl">
                    <p class="font-bold text-cyan-lf">${s.full_name}</p>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">${s.email}</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="text-[9px] bg-white/10 px-2 py-1 rounded-full uppercase">${s.role}</span>
                        <button class="text-red-400 text-xs font-bold">Suspender</button>
                    </div>
                </div>
            `).join('');
        }

        async function fetchGalleries() {
            const res = await fetch(`${BASE_URL}/photographer/galleries`);
            const data = await res.json();
            document.getElementById('galleries-grid').innerHTML = data.map(g => `
                <div class="vault-card bg-slate-50 p-4 border border-slate-100 group">
                    <div class="h-64 bg-white rounded-[2rem] mb-6 flex items-center justify-center relative overflow-hidden shadow-inner">
                        <i class="fa-solid fa-shield-halved text-5xl text-slate-100 group-hover:text-cyan-lf transition-colors duration-500"></i>
                    </div>
                    <div class="px-4 pb-4">
                        <h3 class="text-2xl font-black tracking-tight mb-1 text-slate-800">${g.client_name}</h3>
                        <p class="text-slate-400 font-bold text-[10px] mb-6 tracking-[0.2em] uppercase">Bóveda: /${g.slug}</p>
                        <div class="flex gap-2">
                            <button onclick="openUploadModal(${g.id}, '${g.client_name}')" class="flex-1 bg-black text-white text-[10px] font-black uppercase tracking-widest py-4 rounded-2xl hover:bg-cyan-lf transition-all">Subir Activos</button>
                            <button class="w-14 bg-white border border-slate-200 text-slate-400 rounded-2xl hover:text-cyan-lf hover:border-cyan-lf transition-all"><i class="fa-solid fa-link text-xs"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openUploadModal(id, name) {
            document.getElementById('upload-target-name').innerText = name;
            document.getElementById('upload-modal').classList.remove('hidden');
        }

        function closeUploadModal() { document.getElementById('upload-modal').classList.add('hidden'); }
        function openUserModal() { document.getElementById('user-modal').classList.remove('hidden'); }
        function closeUserModal() { document.getElementById('user-modal').classList.add('hidden'); }

        // Carga inicial
        fetchGalleries();
    </script>
</body>
</html>
